<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f1f5f9"/>
  <rect x="20" y="20" width="360" height="360" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Dress shirt silhouette -->
  <g transform="translate(200,178)">
    <!-- Body -->
    <path d="M-60,-78 L-42,-78 L-20,-58 L-10,-70 L0,-55 L10,-70 L20,-58 L42,-78 L60,-78 L78,-38 L60,-26 L50,-50 L50,78 L-50,78 L-50,-50 L-60,-26 L-78,-38 Z" fill="#003368" opacity="0.85"/>
    <!-- Collar left -->
    <path d="M-20,-78 L-18,-58 L-10,-70 L0,-55 L-5,-78 Z" fill="#002a56" opacity="0.6"/>
    <!-- Collar right -->
    <path d="M20,-78 L18,-58 L10,-70 L0,-55 L5,-78 Z" fill="#002a56" opacity="0.6"/>
    <!-- Button placket -->
    <line x1="0" y1="-55" x2="0" y2="78" stroke="#f1f5f9" stroke-width="1.5" opacity="0.5"/>
    <!-- Buttons -->
    <circle cx="0" cy="-40" r="2" fill="#f1f5f9" opacity="0.5"/>
    <circle cx="0" cy="-20" r="2" fill="#f1f5f9" opacity="0.5"/>
    <circle cx="0" cy="0" r="2" fill="#f1f5f9" opacity="0.5"/>
    <circle cx="0" cy="20" r="2" fill="#f1f5f9" opacity="0.5"/>
    <circle cx="0" cy="40" r="2" fill="#f1f5f9" opacity="0.5"/>
    <!-- Pocket -->
    <rect x="-35" y="-15" width="22" height="20" rx="2" fill="none" stroke="#002a56" stroke-width="1.5" opacity="0.35"/>
  </g>
  <text x="200" y="313" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94a3b8">CHEMISE</text>
  <text x="200" y="335" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#cbd5e1">JABB Streetwear</text>
</svg>