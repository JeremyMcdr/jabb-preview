<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f1f5f9"/>
  <rect x="20" y="20" width="360" height="360" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Hoodie silhouette -->
  <g transform="translate(200,180)">
    <!-- Body -->
    <path d="M-65,-80 L-45,-80 L-25,-60 C-12,-50 12,-50 25,-60 L45,-80 L65,-80 L85,-40 L65,-28 L58,-50 L58,80 L-58,80 L-58,-50 L-65,-28 L-85,-40 Z" fill="#003368" opacity="0.85"/>
    <!-- Hood -->
    <path d="M-35,-80 C-35,-105 -20,-115 0,-115 C20,-115 35,-105 35,-80" fill="none" stroke="#003368" stroke-width="8" opacity="0.85" stroke-linecap="round"/>
    <!-- Pocket -->
    <rect x="-30" y="25" width="60" height="25" rx="4" fill="#002a56" opacity="0.5"/>
    <!-- Drawstrings -->
    <line x1="-8" y1="-55" x2="-8" y2="-35" stroke="#002a56" stroke-width="2" opacity="0.5"/>
    <line x1="8" y1="-55" x2="8" y2="-35" stroke="#002a56" stroke-width="2" opacity="0.5"/>
  </g>
  <text x="200" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94a3b8">SWEAT</text>
  <text x="200" y="337" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#cbd5e1">JABB Streetwear</text>
</svg>