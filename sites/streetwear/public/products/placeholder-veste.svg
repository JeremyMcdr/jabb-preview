<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f1f5f9"/>
  <rect x="20" y="20" width="360" height="360" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Jacket silhouette -->
  <g transform="translate(200,178)">
    <!-- Body -->
    <path d="M-65,-80 L-45,-80 L-22,-58 L-12,-72 L0,-55 L12,-72 L22,-58 L45,-80 L65,-80 L85,-35 L65,-22 L58,-48 L58,80 L-58,80 L-58,-48 L-65,-22 L-85,-35 Z" fill="#003368" opacity="0.85"/>
    <!-- Lapel left -->
    <path d="M-22,-80 L-20,-58 L-12,-72 L0,-55 L-8,-80 Z" fill="#002a56" opacity="0.55"/>
    <!-- Lapel right -->
    <path d="M22,-80 L20,-58 L12,-72 L0,-55 L8,-80 Z" fill="#002a56" opacity="0.55"/>
    <!-- Center zip -->
    <line x1="0" y1="-55" x2="0" y2="80" stroke="#f1f5f9" stroke-width="2.5" opacity="0.45"/>
    <!-- Pockets -->
    <path d="M-45,15 L-10,15 L-10,38 L-45,38 Z" fill="none" stroke="#002a56" stroke-width="1.5" opacity="0.35"/>
    <path d="M10,15 L45,15 L45,38 L10,38 Z" fill="none" stroke="#002a56" stroke-width="1.5" opacity="0.35"/>
  </g>
  <text x="200" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94a3b8">VESTE</text>
  <text x="200" y="337" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#cbd5e1">JABB Streetwear</text>
</svg>