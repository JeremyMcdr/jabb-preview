<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f1f5f9"/>
  <rect x="20" y="20" width="360" height="360" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Softshell jacket silhouette -->
  <g transform="translate(200,178)">
    <!-- Body - fitted athletic shape with stand collar -->
    <path d="M-60,-78 L-40,-78 L-40,-92 C-40,-98 -22,-100 0,-100 C22,-100 40,-98 40,-92 L40,-78 L60,-78 L80,-36 L60,-24 L54,-46 L54,80 L-54,80 L-54,-46 L-60,-24 L-80,-36 Z" fill="#003368" opacity="0.85"/>
    <!-- Stand collar -->
    <path d="M-32,-92 C-32,-98 -18,-100 0,-100 C18,-100 32,-98 32,-92 L32,-78 L-32,-78 Z" fill="#002a56" opacity="0.5"/>
    <!-- Full front zip -->
    <line x1="0" y1="-100" x2="0" y2="80" stroke="#f1f5f9" stroke-width="2" opacity="0.45"/>
    <!-- Zip pull -->
    <rect x="-3" y="-70" width="6" height="8" rx="1" fill="#f1f5f9" opacity="0.4"/>
    <!-- Chest zip pocket left -->
    <line x1="-40" y1="-25" x2="-10" y2="-30" stroke="#002a56" stroke-width="1.5" opacity="0.35"/>
    <!-- Side zip pocket left -->
    <line x1="-48" y1="25" x2="-10" y2="22" stroke="#002a56" stroke-width="1.5" opacity="0.35"/>
    <!-- Side zip pocket right -->
    <line x1="48" y1="25" x2="10" y2="22" stroke="#002a56" stroke-width="1.5" opacity="0.35"/>
    <!-- Shoulder seam lines -->
    <line x1="-40" y1="-78" x2="-54" y2="-46" stroke="#002a56" stroke-width="1" opacity="0.25"/>
    <line x1="40" y1="-78" x2="54" y2="-46" stroke="#002a56" stroke-width="1" opacity="0.25"/>
  </g>
  <text x="200" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94a3b8">SOFTSHELL</text>
  <text x="200" y="337" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#cbd5e1">JABB Streetwear</text>
</svg>