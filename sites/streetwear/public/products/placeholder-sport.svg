<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f1f5f9"/>
  <rect x="20" y="20" width="360" height="360" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Sport jersey silhouette -->
  <g transform="translate(200,175)">
    <!-- Body - athletic fit with raglan sleeves -->
    <path d="M-62,-72 L-40,-72 L-22,-52 C-12,-42 12,-42 22,-52 L40,-72 L62,-72 L88,-30 L68,-18 L55,-48 L52,78 L-52,78 L-55,-48 L-68,-18 L-88,-30 Z" fill="#003368" opacity="0.85"/>
    <!-- V-neck -->
    <path d="M-18,-72 L0,-48 L18,-72" fill="#f1f5f9" opacity="0.8"/>
    <path d="M-20,-72 L0,-50 L20,-72" fill="none" stroke="#002a56" stroke-width="2" opacity="0.5"/>
    <!-- Side stripe left -->
    <path d="M-52,-20 L-52,78 L-44,78 L-44,-25 Z" fill="#002a56" opacity="0.3"/>
    <!-- Side stripe right -->
    <path d="M52,-20 L52,78 L44,78 L44,-25 Z" fill="#002a56" opacity="0.3"/>
    <!-- Number placeholder -->
    <text x="0" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="700" fill="#002a56" opacity="0.2">00</text>
  </g>
  <text x="200" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94a3b8">SPORT</text>
  <text x="200" y="332" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#cbd5e1">JABB Streetwear</text>
</svg>