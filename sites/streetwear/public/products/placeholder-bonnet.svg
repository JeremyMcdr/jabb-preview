<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f1f5f9"/>
  <rect x="20" y="20" width="360" height="360" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Beanie silhouette -->
  <g transform="translate(200,195)">
    <!-- Main beanie shape -->
    <path d="M-55,10 C-55,-20 -50,-50 -35,-65 C-20,-80 -5,-85 0,-88 C5,-85 20,-80 35,-65 C50,-50 55,-20 55,10 Z" fill="#003368" opacity="0.85"/>
    <!-- Ribbed band -->
    <path d="M-58,10 L58,10 L56,30 C50,35 25,38 0,38 C-25,38 -50,35 -56,30 Z" fill="#002a56" opacity="0.7"/>
    <!-- Knit texture lines -->
    <line x1="-35" y1="-55" x2="-30" y2="10" stroke="#002a56" stroke-width="1" opacity="0.3"/>
    <line x1="-15" y1="-75" x2="-10" y2="10" stroke="#002a56" stroke-width="1" opacity="0.3"/>
    <line x1="15" y1="-75" x2="10" y2="10" stroke="#002a56" stroke-width="1" opacity="0.3"/>
    <line x1="35" y1="-55" x2="30" y2="10" stroke="#002a56" stroke-width="1" opacity="0.3"/>
    <!-- Pompom -->
    <circle cx="0" cy="-92" r="12" fill="#003368" opacity="0.7"/>
  </g>
  <text x="200" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94a3b8">BONNET</text>
  <text x="200" y="332" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#cbd5e1">JABB Streetwear</text>
</svg>