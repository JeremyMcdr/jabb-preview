<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f1f5f9"/>
  <rect x="20" y="20" width="360" height="360" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Baseball cap silhouette -->
  <g transform="translate(200,195)">
    <!-- Crown -->
    <path d="M-65,-10 C-65,-55 -40,-80 0,-80 C40,-80 65,-55 65,-10" fill="#003368" opacity="0.85"/>
    <!-- Band -->
    <path d="M-68,-10 L68,-10 C68,-5 65,0 60,0 L-60,0 C-65,0 -68,-5 -68,-10 Z" fill="#002a56" opacity="0.7"/>
    <!-- Visor/Brim -->
    <path d="M-68,-10 C-75,5 -70,30 -50,40 L70,0 L68,-10 Z" fill="#003368" opacity="0.85"/>
    <!-- Top button -->
    <circle cx="0" cy="-80" r="5" fill="#002a56" opacity="0.7"/>
    <!-- Panel stitching -->
    <line x1="0" y1="-80" x2="0" y2="-10" stroke="#002a56" stroke-width="1" opacity="0.4"/>
  </g>
  <text x="200" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94a3b8">CASQUETTE</text>
  <text x="200" y="332" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#cbd5e1">JABB Streetwear</text>
</svg>