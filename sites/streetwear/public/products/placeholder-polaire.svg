<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f1f5f9"/>
  <rect x="20" y="20" width="360" height="360" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Fleece jacket silhouette -->
  <g transform="translate(200,178)">
    <!-- Body with high collar -->
    <path d="M-62,-80 L-42,-80 L-42,-90 C-42,-98 -25,-100 0,-100 C25,-100 42,-98 42,-90 L42,-80 L62,-80 L82,-38 L62,-25 L55,-48 L55,80 L-55,80 L-55,-48 L-62,-25 L-82,-38 Z" fill="#003368" opacity="0.85"/>
    <!-- High collar detail -->
    <path d="M-35,-90 C-35,-98 -20,-100 0,-100 C20,-100 35,-98 35,-90 L35,-78 C25,-82 10,-84 0,-84 C-10,-84 -25,-82 -35,-78 Z" fill="#002a56" opacity="0.55"/>
    <!-- Half zip -->
    <line x1="0" y1="-100" x2="0" y2="-30" stroke="#f1f5f9" stroke-width="2" opacity="0.5"/>
    <!-- Zip pull -->
    <rect x="-3" y="-52" width="6" height="8" rx="1" fill="#f1f5f9" opacity="0.4"/>
    <!-- Chest pocket -->
    <path d="M-40,-30 L-12,-30 L-12,-8 L-40,-8 Z" fill="none" stroke="#002a56" stroke-width="1.5" opacity="0.3"/>
    <!-- Texture dots for fleece feel -->
    <circle cx="-30" cy="20" r="1" fill="#002a56" opacity="0.15"/>
    <circle cx="-15" cy="30" r="1" fill="#002a56" opacity="0.15"/>
    <circle cx="5" cy="15" r="1" fill="#002a56" opacity="0.15"/>
    <circle cx="25" cy="25" r="1" fill="#002a56" opacity="0.15"/>
    <circle cx="35" cy="10" r="1" fill="#002a56" opacity="0.15"/>
    <circle cx="-20" cy="50" r="1" fill="#002a56" opacity="0.15"/>
    <circle cx="15" cy="45" r="1" fill="#002a56" opacity="0.15"/>
    <circle cx="30" cy="55" r="1" fill="#002a56" opacity="0.15"/>
  </g>
  <text x="200" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94a3b8">POLAIRE</text>
  <text x="200" y="337" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#cbd5e1">JABB Streetwear</text>
</svg>