<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f1f5f9"/>
  <rect x="20" y="20" width="360" height="360" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Puffer jacket silhouette -->
  <g transform="translate(200,178)">
    <!-- Body - wider/puffy shape -->
    <path d="M-68,-78 L-48,-78 L-25,-58 C-15,-48 15,-48 25,-58 L48,-78 L68,-78 L90,-32 L68,-18 L60,-45 L62,80 L-62,80 L-60,-45 L-68,-18 L-90,-32 Z" fill="#003368" opacity="0.85"/>
    <!-- Quilted horizontal lines -->
    <line x1="-55" y1="-35" x2="55" y2="-35" stroke="#002a56" stroke-width="2" opacity="0.35"/>
    <line x1="-58" y1="-10" x2="58" y2="-10" stroke="#002a56" stroke-width="2" opacity="0.35"/>
    <line x1="-60" y1="15" x2="60" y2="15" stroke="#002a56" stroke-width="2" opacity="0.35"/>
    <line x1="-61" y1="40" x2="61" y2="40" stroke="#002a56" stroke-width="2" opacity="0.35"/>
    <line x1="-62" y1="65" x2="62" y2="65" stroke="#002a56" stroke-width="2" opacity="0.35"/>
    <!-- Center zip -->
    <line x1="0" y1="-55" x2="0" y2="80" stroke="#f1f5f9" stroke-width="2.5" opacity="0.4"/>
    <!-- Collar padding -->
    <path d="M-25,-78 C-20,-85 -10,-88 0,-88 C10,-88 20,-85 25,-78" fill="#003368" stroke="#002a56" stroke-width="1.5" opacity="0.7"/>
  </g>
  <text x="200" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94a3b8">DOUDOUNE</text>
  <text x="200" y="337" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#cbd5e1">JABB Streetwear</text>
</svg>