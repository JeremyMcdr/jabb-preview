<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f1f5f9"/>
  <rect x="20" y="20" width="360" height="360" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <!-- Bucket hat silhouette -->
  <g transform="translate(200,190)">
    <!-- Crown -->
    <path d="M-45,-10 C-45,-40 -30,-65 0,-65 C30,-65 45,-40 45,-10 Z" fill="#003368" opacity="0.85"/>
    <!-- Band -->
    <rect x="-48" y="-14" width="96" height="10" rx="2" fill="#002a56" opacity="0.6"/>
    <!-- Brim -->
    <path d="M-48,-4 C-55,0 -80,10 -75,25 C-70,35 -30,40 0,40 C30,40 70,35 75,25 C80,10 55,0 48,-4 Z" fill="#003368" opacity="0.85"/>
    <!-- Top flat -->
    <ellipse cx="0" cy="-65" rx="20" ry="5" fill="#002a56" opacity="0.4"/>
  </g>
  <text x="200" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94a3b8">BOB</text>
  <text x="200" y="332" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#cbd5e1">JABB Streetwear</text>
</svg>