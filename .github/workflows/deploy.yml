name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build modern-colored
        run: cd sites/modern-colored && npm ci && npx vite build

      - name: Build streetwear
        run: cd sites/streetwear && npm ci && npx vite build

      - name: Build urban-neon
        run: cd sites/urban-neon && npm ci && npx vite build

      - name: Build modern-b2b
        run: cd sites/modern-b2b && npm ci && npx vite build

      - name: Combine into _site
        run: |
          mkdir -p _site
          cp -r sites/modern-colored/dist _site/modern-colored
          cp -r sites/streetwear/dist _site/streetwear
          cp -r sites/urban-neon/dist _site/urban-neon
          cp -r sites/modern-b2b/dist _site/modern-b2b
          cp landing/index.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
